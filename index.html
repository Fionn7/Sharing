<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-layer" id="bgLayer" aria-hidden="true">
        <div class="bg-slide" data-season="spring" style="background-image:url('images/spring.jpg')"></div>
        <div class="bg-slide" data-season="summer" style="background-image:url('images/summer.jpg')"></div>
        <div class="bg-slide" data-season="autumn" style="background-image:url('images/autumn.jpg')"></div>
        <div class="bg-slide" data-season="winter" style="background-image:url('images/winter.jpg')"></div>
    </div>

    <canvas class="particle-canvas" id="particleCanvas" aria-hidden="true"></canvas>

    <div class="overlay" aria-hidden="true"></div>

    <header class="nav" role="banner">
        <div class="brand">
            <div class="brand-mark" aria-hidden="true">南</div>
            <div class="brand-text">
                <h1>南京师范大学</h1>
                <p>NANJING NORMAL UNIVERSITY · 随园</p>
            </div>
        </div>

        <nav class="season-nav" aria-label="四季切换">
            <button class="season-btn is-active" data-season="spring">
                <span class="dot"></span><span class="label">春</span>
            </button>
            <button class="season-btn" data-season="summer">
                <span class="dot"></span><span class="label">夏</span>
            </button>
            <button class="season-btn" data-season="autumn">
                <span class="dot"></span><span class="label">秋</span>
            </button>
            <button class="season-btn" data-season="winter">
                <span class="dot"></span><span class="label">冬</span>
            </button>
        </nav>

        <div class="playback">
            <button class="toggle-btn" id="toggleBtn" aria-pressed="true">
                <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
                <span class="toggle-label">自动播放</span>
            </button>
        </div>
    </header>

    <div class="main-content">
        <h1>文件上传</h1>
        
        <div class="main-container">
            <div class="upload-section">
                <div class="upload-box">
                    <input type="file" id="file-input" multiple>
                    <label for="file-input">选择文件（支持多文件）</label>
                    <p>支持各类文件格式，单个文件最大 50MB。</p>
                    <div id="status"></div>
                    <div id="upload-progress" class="upload-progress"></div>
                </div>
            </div>

            <div class="file-section">
                <div class="file-list">
                    <h2>已上传的文件</h2>
                    <div id="file-list" class="categories-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <section class="stats" aria-label="学校概况">
        <div class="stat-item">
            <div class="stat-num"><span class="num" data-to="1902">1902</span></div>
            <div class="stat-label">三江师范学堂 · 肇始</div>
        </div>
        <div class="stat-item">
            <div class="stat-num"><span class="num" data-to="29">29</span></div>
            <div class="stat-label">二级学院</div>
        </div>
        <div class="stat-item">
            <div class="stat-num"><span class="num" data-to="82">82</span></div>
            <div class="stat-label">本科专业</div>
        </div>
        <div class="stat-item">
            <div class="stat-num"><span class="num" data-to="15">15</span><span class="plus">+</span></div>
            <div class="stat-label">学科 ESI 全球前 1%</div>
        </div>
        <div class="stat-item">
            <div class="stat-num"><span class="num" data-to="3">3</span></div>
            <div class="stat-label">仙林 · 随园 · 紫金</div>
        </div>
        <div class="stat-item">
            <div class="stat-num"><span class="num">双一流</span></div>
            <div class="stat-label">国家建设高校</div>
        </div>
    </section>

    <footer class="foot">
        <div class="foot-left">
            <span class="season-indicator" id="seasonIndicator">春</span>
            <span class="foot-sep">·</span>
            <span id="footClock" class="footClock">--:--</span>
            <span class="foot-sep">·</span>
            <span class="foot-note">严谨 · 朴实 · 奋发 · 奉献</span>
        </div>
        <div class="foot-right">
            <span>手机 · 平板 · 桌面自适应</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
