<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF上传</title>
    <style>
        body { max-width: 600px; margin: 50px auto; padding: 0 20px; font-family: Arial, sans-serif; }
        .upload-box { border: 2px dashed #ccc; padding: 40px; text-align: center; border-radius: 10px; }
        .upload-box:hover { border-color: #007bff; }
        #file-input { display: none; }
        label { background: #007bff; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #status { margin-top: 20px; }
        .pdf-list { margin-top: 40px; }
        .pdf-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; }
        .pdf-item a { text-decoration: none; color: #007bff; }
        .delete-btn { border: 1px solid #dc3545; background: #fff; color: #dc3545; border-radius: 4px; padding: 6px 10px; cursor: pointer; }
        .delete-btn:hover { background: #dc3545; color: #fff; }
    </style>
</head>
<body>
    <h1>PDF文件上传</h1>
    
    <div class="upload-box">
        <input type="file" id="file-input" accept=".pdf">
        <label for="file-input">选择PDF文件</label>
        <p>上传将通过后端接口保存到 GitHub 仓库，支持更大的 PDF 文件。</p>
        <div id="status"></div>
    </div>

    <div class="pdf-list">
        <h2>已上传的PDF</h2>
        <div id="pdf-list"></div>
    </div>

    <script>
        // ====================== 只需要修改这3行 ======================
        const GITHUB_USERNAME = "Fionn7"; // 比如：zhangsan
        const GITHUB_REPO = "Sharing"; // 比如：zhangsan.github.io 或者 my-pdf-site
        const PDF_FOLDER = "pdfs"; // 存放PDF的文件夹名，不用改
        const API_BASE = 'https://sharing-h7es.onrender.com';
        // ============================================================

        const fileInput = document.getElementById('file-input');
        const statusDiv = document.getElementById('status');
        const pdfListDiv = document.getElementById('pdf-list');

        // 加载已上传的PDF列表
        async function loadPdfList() {
            try {
                const response = await fetch(`${API_BASE}/api/files`);
                const result = await response.json().catch(() => ({}));

                if (!response.ok || !result.ok) {
                    throw new Error(result.message || '加载失败');
                }

                const files = Array.isArray(result.files) ? result.files : [];
                pdfListDiv.innerHTML = '';

                if (files.length === 0) {
                    pdfListDiv.innerHTML = '<p>当前还没有上传的 PDF 文件。</p>';
                    return;
                }

                files.forEach(file => {
                    const pdfUrl = `https://${GITHUB_USERNAME}.github.io/${GITHUB_REPO}/${PDF_FOLDER}/${file.name}`;
                    const item = document.createElement('div');
                    item.className = 'pdf-item';
                    item.innerHTML = `
                        <a href="${pdfUrl}" target="_blank">${file.name}</a>
                        <button type="button" class="delete-btn" data-name="${file.name}">删除</button>
                    `;
                    pdfListDiv.appendChild(item);
                });
            } catch (error) {
                pdfListDiv.innerHTML = `<p>加载PDF列表失败：${error.message || '请稍后重试'}</p>`;
            }
        }

        // 上传文件
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            if (file.size > 25 * 1024 * 1024) {
                statusDiv.innerHTML = '<p style="color: red;">文件大小不能超过25MB</p>';
                return;
            }

            statusDiv.innerHTML = '<p>正在上传...</p>';

            statusDiv.innerHTML = '<p>正在上传到后端...</p>';

            try {
                const formData = new FormData();
                formData.append('pdf', file, file.name);
                formData.append('filename', file.name);

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 40000);

                const response = await fetch(`${API_BASE}/api/upload`, {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal,
                });

                clearTimeout(timeoutId);

                const result = await response.json().catch(() => ({}));

                if (!response.ok || !result.ok) {
                    throw new Error(result.message || '上传失败');
                }

                statusDiv.innerHTML = '<p style="color: green;">上传成功，文件已写入仓库。</p>';
                loadPdfList();
            } catch (error) {
                const message = error.name === 'AbortError'
                    ? '上传超时，请检查后端是否已启动。'
                    : '上传失败：' + (error.message || '请稍后重试');
                statusDiv.innerHTML = `<p style="color: red;">${message}</p>`;
            }
        });

        pdfListDiv.addEventListener('click', async (e) => {
            const button = e.target.closest('.delete-btn');
            if (!button) return;

            const name = button.dataset.name;
            if (!name) return;

            if (!window.confirm(`确认删除 ${name} 吗？`)) return;

            statusDiv.innerHTML = `<p>正在删除 ${name}...</p>`;

            try {
                const response = await fetch(`${API_BASE}/api/files/${encodeURIComponent(name)}`, { method: 'DELETE' });
                const result = await response.json().catch(() => ({}));

                if (!response.ok || !result.ok) {
                    throw new Error(result.message || '删除失败');
                }

                statusDiv.innerHTML = `<p style="color: green;">已删除 ${name}</p>`;
                loadPdfList();
            } catch (error) {
                statusDiv.innerHTML = `<p style="color: red;">删除失败：${error.message || '请稍后重试'}</p>`;
            }
        });

        // 页面加载时显示PDF列表
        loadPdfList();
    </script>
</body>
</html>
