<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传 - 南京师范大学</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 季节动态背景 -->
    <div id="season-bg" class="season-bg spring">
        <div id="particles-container" class="particles-container"></div>
        <div class="bg-overlay"></div>
    </div>
    
    <!-- 季节标题 -->
    <div id="season-title" class="season-title"></div>
    
    <h1>文件上传</h1>
    
    <div class="main-container">
        <div class="upload-section">
            <div class="upload-box">
                <input type="file" id="file-input" multiple>
                <label for="file-input">选择文件（支持多文件）</label>
                <p>支持各类文件格式，单个文件最大 50MB。</p>
                <div id="status"></div>
                <div id="upload-progress" class="upload-progress"></div>
            </div>
        </div>

        <div class="file-section">
            <div class="file-list">
                <h2>已上传的文件</h2>
                <div id="file-list" class="categories-grid"></div>
            </div>
        </div>
    </div>

    <script>
        // ====================== 只需要修改这3行 ======================
        const GITHUB_USERNAME = "Fionn7"; // 比如：zhangsan
        const GITHUB_REPO = "Sharing"; // 比如：zhangsan.github.io 或者 my-pdf-site
        const PDF_FOLDER = "pdfs"; // 存放PDF的文件夹名，不用改
        const API_BASE = 'https://sharing-h7es.onrender.com';
        // ============================================================
        
        // 文件类型配置
        const FILE_CATEGORIES = {
            pdfs: { name: 'PDF文档', icon: '📄', color: '#333' },
            documents: { name: '文档', icon: '📝', color: '#333' },
            images: { name: '图片', icon: '🖼️', color: '#333' },
            videos: { name: '视频', icon: '🎬', color: '#333' },
            audio: { name: '音频', icon: '🎵', color: '#333' },
            archives: { name: '压缩包', icon: '📦', color: '#333' },
            codes: { name: '代码', icon: '💻', color: '#333' },
            others: { name: '其他', icon: '📁', color: '#333' }
        };
        
        // 获取文件类型
        function getFileCategory(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const categories = {
                pdf: 'pdfs',
                doc: 'documents', docx: 'documents',
                xls: 'documents', xlsx: 'documents',
                ppt: 'documents', pptx: 'documents',
                txt: 'documents',
                jpg: 'images', jpeg: 'images', png: 'images', gif: 'images', bmp: 'images', svg: 'images',
                mp4: 'videos', avi: 'videos', mov: 'videos', wmv: 'videos',
                mp3: 'audio', wav: 'audio', flac: 'audio',
                zip: 'archives', rar: 'archives', '7z': 'archives', tar: 'archives', gz: 'archives',
                js: 'codes', html: 'codes', css: 'codes', json: 'codes', py: 'codes', java: 'codes', cpp: 'codes', c: 'codes', xml: 'codes'
            };
            return categories[ext] || 'others';
        }
        
        // 获取文件图标
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                pdf: '📄',
                doc: '📝', docx: '📝',
                xls: '📊', xlsx: '📊',
                ppt: '📽️', pptx: '📽️',
                txt: '📃',
                jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', bmp: '🖼️', svg: '🖼️',
                mp4: '🎬', avi: '🎬', mov: '🎬', wmv: '🎬',
                mp3: '🎵', wav: '🎵', flac: '🎵',
                zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦',
                js: '💻', html: '💻', css: '💻', json: '💻', py: '💻', java: '💻', cpp: '💻', c: '💻', xml: '💻'
            };
            return icons[ext] || '📁';
        }

        const fileInput = document.getElementById('file-input');
        const statusDiv = document.getElementById('status');
        const fileListDiv = document.getElementById('file-list');
        const uploadProgressDiv = document.getElementById('upload-progress');

        // 加载已上传的文件列表
        async function loadFileList() {
            try {
                const response = await fetch(`${API_BASE}/api/files`);
                const result = await response.json().catch(() => ({}));

                if (!response.ok || !result.ok) {
                    throw new Error(result.message || '加载失败');
                }

                const files = Array.isArray(result.files) ? result.files : [];
                fileListDiv.innerHTML = '';

                if (files.length === 0) {
                    fileListDiv.innerHTML = '<p>当前还没有上传的文件。</p>';
                    return;
                }
                
                // 按文件夹分类文件
                const categorizedFiles = {};
                files.forEach(file => {
                    const category = getFileCategory(file.name);
                    if (!categorizedFiles[category]) {
                        categorizedFiles[category] = [];
                    }
                    categorizedFiles[category].push(file);
                });
                
                // 显示分类
                Object.keys(categorizedFiles).forEach(category => {
                    const categoryInfo = FILE_CATEGORIES[category] || FILE_CATEGORIES.others;
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'file-category';
                    categoryDiv.innerHTML = `
                        <h3 class="category-title">${categoryInfo.icon} ${categoryInfo.name} (${categorizedFiles[category].length})</h3>
                        <div class="category-files"></div>
                    `;
                    
                    const filesContainer = categoryDiv.querySelector('.category-files');
                    categorizedFiles[category].forEach(file => {
                        const fileUrl = file.download_url || `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/${category}/${file.name}`;
                        const icon = getFileIcon(file.name);
                        const item = document.createElement('div');
                        item.className = 'file-item';
                        item.innerHTML = `
                            <span class="file-icon">${icon}</span>
                            <a href="${fileUrl}" target="_blank" rel="noopener">${file.name}</a>
                            <button type="button" class="delete-btn" data-name="${file.name}" data-category="${category}">删除</button>
                        `;
                        filesContainer.appendChild(item);
                    });
                    
                    fileListDiv.appendChild(categoryDiv);
                });
            } catch (error) {
                fileListDiv.innerHTML = `<p>加载文件列表失败：${error.message || '请稍后重试'}</p>`;
            }
        }

        // 创建上传状态项
        function createFileStatusItem(fileName, fileSize) {
            const item = document.createElement('div');
            item.className = 'file-status uploading';
            const sizeStr = fileSize > 1024 * 1024 
                ? (fileSize / 1024 / 1024).toFixed(1) + 'MB' 
                : (fileSize / 1024).toFixed(0) + 'KB';
            item.innerHTML = `
                <span class="status-icon">⏳</span>
                <span class="file-name" title="${fileName}">${fileName}</span>
                <div class="progress-container">
                    <div class="mini-progress">
                        <div class="mini-progress-bar" style="width: 0%"></div>
                    </div>
                    <span class="progress-text">0%</span>
                </div>
            `;
            return item;
        }

        // 使用 XMLHttpRequest 上传文件（支持进度）
        function uploadFileWithProgress(file, onProgress, onComplete) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                const formData = new FormData();
                formData.append('file', file, file.name);
                formData.append('filename', file.name);

                // 超时设置（30秒 - Render 免费版限制）
                xhr.timeout = 30000;

                // 上传进度
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        onProgress(percent);
                    }
                });

                // 完成
                xhr.addEventListener('load', () => {
                    try {
                        const result = JSON.parse(xhr.responseText);
                        if (xhr.status >= 200 && xhr.status < 300 && result.ok) {
                            resolve(result);
                        } else {
                            // 显示详细错误信息
                            let errorMsg = result.message || '上传失败';
                            if (result.details) {
                                errorMsg += ' (' + xhr.status + ')';
                            }
                            reject(new Error(errorMsg));
                        }
                    } catch (e) {
                        reject(new Error('服务器响应格式错误 (' + xhr.status + ')'));
                    }
                });

                // 错误
                xhr.addEventListener('error', () => {
                    reject(new Error('网络错误'));
                });

                // 超时
                xhr.addEventListener('timeout', () => {
                    reject(new Error('上传超时'));
                });

                xhr.open('POST', `${API_BASE}/api/upload`);
                xhr.send(formData);
            });
        }

        // 上传文件
        fileInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            
            // 检查文件大小 - 50MB 限制
            const maxSize = 50 * 1024 * 1024;
            for (const file of files) {
                if (file.size > maxSize) {
                    const sizeStr = (file.size / 1024 / 1024).toFixed(1) + 'MB';
                    statusDiv.innerHTML = `<p style="color: red;">文件 ${file.name} (${sizeStr}) 超过 50MB 限制。</p>`;
                    return;
                }
            }

            statusDiv.innerHTML = `<p style="color: #666;">正在上传 ${files.length} 个文件...</p>`;
            uploadProgressDiv.innerHTML = '';

            const fileStatusItems = [];
            
            // 创建所有文件的状态项
            for (const file of files) {
                const item = createFileStatusItem(file.name, file.size);
                uploadProgressDiv.appendChild(item);
                fileStatusItems.push({ file, item });
            }

            let successCount = 0;
            let failCount = 0;

            // 逐个上传文件
            for (const { file, item } of fileStatusItems) {
                try {
                    const result = await uploadFileWithProgress(
                        file,
                        (percent) => {
                            const bar = item.querySelector('.mini-progress-bar');
                            const text = item.querySelector('.progress-text');
                            bar.style.width = percent + '%';
                            text.textContent = percent + '%';
                        }
                    );

                    item.className = 'file-status success';
                    item.querySelector('.status-icon').textContent = '✅';
                    item.querySelector('.mini-progress-bar').style.width = '100%';
                    item.querySelector('.progress-text').textContent = '完成';
                    successCount++;
                } catch (error) {
                    item.className = 'file-status error';
                    item.querySelector('.status-icon').textContent = '❌';
                    item.querySelector('.progress-text').textContent = '失败';
                    console.error('Upload error:', file.name, error);
                    failCount++;
                }
            }

            if (failCount === 0) {
                statusDiv.innerHTML = `<p style="color: green;">全部 ${successCount} 个文件上传成功！</p>`;
            } else {
                statusDiv.innerHTML = `<p style="color: orange;">上传完成：成功 ${successCount} 个，失败 ${failCount} 个</p>`;
            }
            
            // 5秒后清除进度显示
            setTimeout(() => {
                uploadProgressDiv.innerHTML = '';
            }, 5000);
            
            loadFileList();
        });

        fileListDiv.addEventListener('click', async (e) => {
            const button = e.target.closest('.delete-btn');
            if (!button) return;

            const name = button.dataset.name;
            const category = button.dataset.category;
            if (!name) return;

            if (!window.confirm(`确认删除 ${name} 吗？`)) return;

            statusDiv.innerHTML = `<p>正在删除 ${name}...</p>`;

            try {
                const deleteUrl = category 
                    ? `${API_BASE}/api/files/${encodeURIComponent(name)}?category=${encodeURIComponent(category)}`
                    : `${API_BASE}/api/files/${encodeURIComponent(name)}`;
                const response = await fetch(deleteUrl, { method: 'DELETE' });
                const result = await response.json().catch(() => ({}));

                if (!response.ok || !result.ok) {
                    throw new Error(result.message || '删除失败');
                }

                statusDiv.innerHTML = `<p style="color: green;">已删除 ${name}</p>`;
                loadFileList();
            } catch (error) {
                statusDiv.innerHTML = `<p style="color: red;">删除失败：${error.message || '请稍后重试'}</p>`;
            }
        });

        // 页面加载时显示文件列表
        loadFileList();
        
        // ==================== 南京师范大学四季动态背景 ====================
        
        // 季节配置
        const SEASONS = {
            spring: {
                name: '春季·随园',
                months: [3, 4, 5],
                bgGradient: 'linear-gradient(135deg, #ffeef8 0%, #fff5f7 30%, #f0f9ff 70%, #e6f7ff 100%)',
                titleColor: '#e91e63'
            },
            summer: {
                name: '夏季·仙林',
                months: [6, 7, 8],
                bgGradient: 'linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 30%, #80deea 70%, #4dd0e1 100%)',
                titleColor: '#00bcd4'
            },
            autumn: {
                name: '秋季·紫金',
                months: [9, 10, 11],
                bgGradient: 'linear-gradient(135deg, #fff8e1 0%, #ffecb3 30%, #ffe0b2 70%, #ffcc80 100%)',
                titleColor: '#ff9800'
            },
            winter: {
                name: '冬季·南师',
                months: [12, 1, 2],
                bgGradient: 'linear-gradient(135deg, #eceff1 0%, #cfd8dc 30%, #b0bec5 70%, #90a4ae 100%)',
                titleColor: '#607d8b'
            }
        };
        
        // 获取当前季节
        function getCurrentSeason() {
            const month = new Date().getMonth() + 1;
            for (const [season, config] of Object.entries(SEASONS)) {
                if (config.months.includes(month)) {
                    return { key: season, ...config };
                }
            }
            return { key: 'spring', ...SEASONS.spring };
        }
        
        // 粒子类型
        const PARTICLE_TYPES = {
            spring: ['sakura', 'leaf', 'butterfly'],
            summer: ['sun', 'star', 'firefly'],
            autumn: ['maple', 'leaf-gold', 'acorn'],
            winter: ['snowflake', 'snow', 'ice']
        };
        
        // 鼠标位置
        let mouseX = 0;
        let mouseY = 0;
        let particles = [];
        
        // 创建粒子
        function createParticle(container, season, delay = 0) {
            const types = PARTICLE_TYPES[season];
            const type = types[Math.floor(Math.random() * types.length)];
            
            const particle = document.createElement('div');
            particle.className = `particle ${type}`;
            
            // 随机位置和大小
            const size = Math.random() * 30 + 20;
            const startX = Math.random() * 100;
            const duration = Math.random() * 15 + 10;
            
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = startX + '%';
            particle.style.top = '-60px';
            particle.style.animationDelay = delay + 's';
            particle.style.animationDuration = duration + 's';
            particle.style.opacity = Math.random() * 0.7 + 0.3;
            
            // 存储粒子信息
            const particleInfo = {
                element: particle,
                x: startX,
                y: -10,
                speedY: 1 + Math.random(),
                speedX: (Math.random() - 0.5) * 0.5,
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 4,
                scale: 1,
                originalScale: 1
            };
            
            particles.push(particleInfo);
            container.appendChild(particle);
            
            // 动画结束后移除
            setTimeout(() => {
                const index = particles.indexOf(particleInfo);
                if (index > -1) {
                    particles.splice(index, 1);
                }
                particle.remove();
            }, duration * 1000);
        }
        
        // 更新粒子位置（鼠标交互）
        function updateParticles() {
            particles.forEach((p, index) => {
                // 计算与鼠标的距离
                const particleX = p.x * window.innerWidth / 100;
                const particleY = p.y * window.innerHeight / 100;
                const dx = particleX - mouseX;
                const dy = particleY - mouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // 鼠标接近时的交互效果
                if (distance < 150) {
                    const force = (150 - distance) / 150;
                    p.speedX += (dx / distance) * force * 0.3;
                    p.speedY += (dy / distance) * force * 0.2;
                    p.scale = 1 + force * 0.5;
                    p.element.style.transform = `scale(${p.scale}) rotate(${p.rotation}deg)`;
                } else {
                    p.scale = p.originalScale;
                    p.element.style.transform = `scale(${p.scale}) rotate(${p.rotation}deg)`;
                }
                
                // 更新位置
                p.y += p.speedY;
                p.x += p.speedX;
                p.rotation += p.rotationSpeed;
                
                // 边界检查
                if (p.x < 0) p.x = 0;
                if (p.x > 100) p.x = 100;
                
                // 应用位置
                p.element.style.left = p.x + '%';
                p.element.style.top = p.y + 'vh';
            });
            
            requestAnimationFrame(updateParticles);
        }
        
        // 鼠标移动监听
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        // 初始化季节背景
        function initSeasonBackground() {
            const season = getCurrentSeason();
            const bgElement = document.getElementById('season-bg');
            const titleElement = document.getElementById('season-title');
            const particlesContainer = document.getElementById('particles-container');
            
            // 设置背景类名和样式
            bgElement.className = 'season-bg ' + season.key;
            bgElement.style.background = season.bgGradient;
            
            // 设置季节标题
            titleElement.textContent = season.name;
            titleElement.style.color = season.titleColor;
            
            // 清除旧粒子
            particlesContainer.innerHTML = '';
            particles = [];
            
            // 创建新粒子
            const particleCount = 40;
            for (let i = 0; i < particleCount; i++) {
                setTimeout(() => {
                    createParticle(particlesContainer, season.key, i * 0.3);
                }, i * 200);
            }
            
            // 持续生成粒子
            setInterval(() => {
                if (particles.length < 50) {
                    createParticle(particlesContainer, season.key, 0);
                }
            }, 500);
            
            // 启动粒子更新
            updateParticles();
        }
        
        // 初始化
        initSeasonBackground();
    </script>
</body>
</html>
