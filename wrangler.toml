name = "sharing"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]

# Worker 入口文件
main = "_worker.js"

# Pages 配置
pages_build_output_dir = "public"

[observability]
enabled = true

# 配置环境变量
[vars]
PORT = "3100"

# R2 存储绑定配置
[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "sharing-files"
